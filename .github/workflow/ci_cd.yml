# This file defines GitHub Actions CI/CD pipeline

name: CI/CD Pipeline  # pipeline name

on:
  push:
    branches: [main]  # trigger on push to main branch
  pull_request:
    branches: [main]  # trigger on pull request to main branch

jobs:
  test:
    name: Run Tests  # job name
    runs-on: ubuntu-latest  # run on ubuntu

    services:
      mysql:  # start mysql service for testing
        image: mysql:8.0  # mysql version
        env:
          MYSQL_ROOT_PASSWORD: 2002yash2002 # root password
          MYSQL_DATABASE: shoppers_db  # database name
        ports:
          - 3306:3306  # expose mysql port
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      postgres:  # start postgresql service for warehouse
        image: postgres:15  # postgresql version
        env:
          POSTGRES_PASSWORD: 12345  # postgres password
          POSTGRES_DB: shoppers_warehouse  # warehouse database name
        ports:
          - 5432:5432  # expose postgresql port
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code  # clone repo
        uses: actions/checkout@v3

      - name: Set up Python  # setup python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies  # install requirements
        run: pip install -r requirements.txt

      - name: Setup database and train model  # load data and train model
        env:
          DB_HOST: 127.0.0.1  # mysql host
          DB_PORT: 3306  # mysql port
          DB_USER: root  # mysql user
          DB_PASSWORD: 2002yash2002  # mysql password
          DB_NAME: shoppers_db  # mysql database
          PG_HOST: 127.0.0.1  # postgresql host
          PG_PORT: 5432  # postgresql port
          PG_USER: postgres  # postgresql user
          PG_PASSWORD: 12345  # postgresql password
          PG_NAME: shoppers_warehouse  # postgresql database
          MLFLOW_TRACKING_URI: ./mlruns  # mlflow tracking uri
          MODEL_PATH: ./ml/model.pkl  # model save path
        run: |
          python data/reload_data.py
          python etl/load.py
          python ml/train.py

      - name: Run pytest  # run all tests
        env:
          DB_HOST: 127.0.0.1  # mysql host
          DB_PORT: 3306  # mysql port
          DB_USER: root  # mysql user
          DB_PASSWORD: 2002yash2002  # mysql password
          DB_NAME: shoppers_db  # mysql database
          PG_HOST: 127.0.0.1  # postgresql host
          PG_PORT: 5432  # postgresql port
          PG_USER: postgres  # postgresql user
          PG_PASSWORD: 12345  # postgresql password
          PG_NAME: shoppers_warehouse  # postgresql database
          MLFLOW_TRACKING_URI: ./mlruns  # mlflow tracking uri
          MODEL_PATH: ./ml/model.pkl  # model save path
        run: pytest tests/test_api.py -v  # run tests with verbose output

  build-and-push:
    name: Build and Push Docker Image  # job name
    runs-on: ubuntu-latest  # run on ubuntu
    needs: test  # run only if test job passes

    steps:
      - name: Checkout code  # clone repo
        uses: actions/checkout@v3

      - name: Login to Docker Hub  # login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # docker hub username
          password: ${{ secrets.DOCKER_PASSWORD }}  # docker hub token

      - name: Build and Push Docker image  # build and push image
        uses: docker/build-push-action@v5
        with:
          context: .  # build context is root directory
          push: true  # push to docker hub
          tags: ${{ secrets.DOCKER_USERNAME }}/shoppers-data:latest  # image tag